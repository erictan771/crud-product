name: CI/CD Deployment to Ubuntu VM

on:
  push:
    branches: [ "main" ] # Triggers the pipeline on code push to main

jobs:
  deploy:
    runs-on: self-hosted # Tells GitHub to execute this job on your Ubuntu VM runner

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t my-app:latest .

      - name: Stop and Remove Existing Container
        run: |
          docker stop my-app-container || true
          docker rm my-app-container || true

      - name: Run New Container
        run: docker run -d --name my-app-container -p 80:80 my-app:latest
