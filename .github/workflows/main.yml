name: Deploy Laravel App with Docker

on:
  push:
    branches:
      - main  # Triggers the deployment when you push to the main branch

jobs:
  deploy:
    runs-on: self-hosted  # Tells GitHub to use your Ubuntu VM runner

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Create .env File
        run: |
          # 1. Salin .env.example menjadi .env resmi
          cp .env.example .env

          # 2. Ubah Driver SQLite menjadi MySQL dan arahkan Host ke service 'db'
          sed -i 's/DB_CONNECTION=sqlite/DB_CONNECTION=mysql/g' .env
          sed -i 's/# DB_HOST=127.0.0.1/DB_HOST=db/g' .env
          sed -i 's/# DB_PORT=3306/DB_PORT=3306/g' .env

          # 3. Kosongkan baris database bawaan agar tidak double
          sed -i 's/# DB_DATABASE=laravel//g' .env
          sed -i 's/# DB_USERNAME=root//g' .env
          sed -i 's/# DB_PASSWORD=//g' .env

          # 4. Tempelkan isi PROD_ENV ke bagian paling bawah file
          cat << 'EOF' >> .env
          ${{ secrets.PROD_ENV }}
          EOF

          # 5. Ubah environment menjadi production demi keamanan (Opsional tapi disarankan)
          sed -i 's/APP_ENV=local/APP_ENV=production/g' .env
          sed -i 's/APP_DEBUG=true/APP_DEBUG=false/g' .env

      - name: Build and Start Containers
        run: |
          export DOCKER_BUILDKIT=1
          docker compose down

          # Jalur alternatif tanpa flag network eksternal
          docker compose build --build-arg BUILDKIT_INLINE_CACHE=1 app
          docker compose up -d

      - name: Initialize Laravel Application Key
        run: |
          docker compose exec -T app php artisan key:generate --force

      - name: Run Database Migrations
        run: |
          docker compose exec -T app php artisan migrate --force

      - name: Clear and Optimize Cache
        run: |
          docker compose exec -T app php artisan config:clear
          docker compose exec -T app php artisan config:cache
          docker compose exec -T app php artisan route:cache
          docker compose exec -T app php artisan view:cache

      - name: Cleanup Unused Docker Images
        run: |
          docker image prune -f
