name: Deploy (Docker Compose)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux
            runner: [self-hosted, Linux]
          - label: windows
            runner: [self-hosted, Windows]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env from secret (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          PROD_ENV: ${{ secrets.PROD_ENV }}
        run: |
          if [ -z "$PROD_ENV" ]; then
            echo "Missing PROD_ENV secret"
            exit 1
          fi
          printf '%s' "$PROD_ENV" > .env

      - name: Write .env from secret (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        env:
          PROD_ENV: ${{ secrets.PROD_ENV }}
        run: |
          if ([string]::IsNullOrEmpty($env:PROD_ENV)) {
            Write-Error "Missing PROD_ENV secret"
            exit 1
          }
          Set-Content -Path .env -NoNewline -Value $env:PROD_ENV

      - name: Build & start containers
        shell: bash
        run: |
          set -euo pipefail
          docker compose pull || true
          docker compose build --pull
          docker compose up -d --remove-orphans

      - name: Run migrations & seed
        shell: bash
        run: |
          set -euo pipefail
          docker compose exec -T app php artisan key:generate --force || true
          docker compose exec -T app php artisan migrate --force
          docker compose exec -T app php artisan db:seed --force

      - name: Health check (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: curl -fsS -I http://localhost/ | head -n 1

      - name: Health check (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $res = Invoke-WebRequest -Uri http://localhost/ -Method Head -UseBasicParsing
          "$($res.StatusCode) $($res.StatusDescription)"
