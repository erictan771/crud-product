services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: laravel_app
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - .:/var/www
      - ./.env:/var/www/.env:ro
    networks:
      - app-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: nginx_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: crud_docker
      MYSQL_USER: crud_docker
      MYSQL_PASSWORD: password    # Gantilah dengan password yang lebih aman
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - v-db:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  v-db:
    driver: local
