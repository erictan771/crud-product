version: "3.8"

services:
  app:
    image: crud-product-app:latest
    deploy:
      replicas: 2
      update_config:
        order: start-first
        delay: 5s
        failure_action: rollback
      restart_policy:
        condition: any
    healthcheck:
      test: ["CMD", "php", "artisan", "--version"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ./.env:/var/www/.env
    networks:
      - app-network

  web:
    image: crud-product-web:latest
    deploy:
      replicas: 2
      update_config:
        order: start-first
        delay: 5s
        failure_action: rollback
      restart_policy:
        condition: any
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network

  db:
    image: mysql:8.0
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    environment:
      MYSQL_DATABASE: crud_docker
      MYSQL_USER: crud_docker
      MYSQL_PASSWORD: password    # Gantilah dengan password yang lebih aman
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - v-db:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:
    driver: overlay

volumes:
  v-db:
    driver: local
