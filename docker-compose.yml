services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - app-src:/var/www
      - ./.env:/var/www/.env
    networks:
      - app-network

  web:
    image: nginx:alpine
    container_name: nginx_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - app-src:/var/www
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: crud_docker
      MYSQL_USER: crud_docker
      MYSQL_PASSWORD: password    # Gantilah dengan password yang lebih aman
      MYSQL_ROOT_PASSWORD: root_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p"]
      interval: 5s
      timeout: 35s
      retries: 10
    ports:
      - "3306:3306"
    volumes:
      - v-db:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  v-db:
    driver: local
  app-src:
    driver: local
